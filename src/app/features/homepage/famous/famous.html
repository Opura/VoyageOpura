<section class="bg-[#dfe0dd] text-[#181a24] pb-4">
    <div class="container mx-auto px-4 py-16 text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-6">Découvrez nos destinations les plus populaires</h2>
        <p class="text-lg md:text-xl">Envolez-vous vers des destinations incroyables et inoubliables !</p>
    </div>
    <div>
        @if (destinations().length > 0) {
            <div class="container mx-auto">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                    @for (destination of destinations(); track destination.id) {
                        <div class="relative rounded-border overflow-hidden">
                            <img [src]="destination.imageUrl" [alt]="destination.name" class="w-full h-64 object-cover" />
                            <h3 class="font-bold text-xl">{{ destination.name }}</h3>
                            <p>{{ destination.country }}</p>
                            <div class="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity duration-300">
                                <a routerLink="/destinations/{{ destination.id }}" class="bg-[#181a24] text-[#ffe066] rounded-full px-6 py-2 text-center text:sm md:text-lg font-semibold hover:bg-[#ffd54f] hover:text-[#181a24] transition-colors duration-300">Voir les détails</a>
                            </div>
                        </div>
                    }
                </div>
            </div>
        }
    </div>
</section>
