<section class="bg-[#e6eaf3] text-[#181a24] pb-4">
    <div class="container mx-auto px-4 py-16 text-center">
        <h2 class="text-4xl md:text-5xl font-bold mb-6">Profitez d'offres exceptionnelles sur notre sélection de voyages</h2>
        <p class="text-lg md:text-xl">Découvrez des destinations de rêve, des offres exclusives et des expériences inoubliables.</p>
    </div>
    <div>
        @if (voyagesPromoted().length > 0) {
            <div class="container mx-auto">
                <p-carousel [value]="voyagesPromoted()" [numVisible]="3" [numScroll]="1" [responsiveOptions]="responsiveOptions" [circular]="true" autoplayInterval="5000" >
                    <ng-template pTemplate="item" let-voyage>
                    <div class="m-2 p-4 space-y-8">
                        <div class="mb-4">
                            <div class="relative mx-auto">
                                <img [src]="voyage.imageUrls[0]" [alt]="voyage.title" class="w-full h-64 rounded-border"  />
                                <p-tag [value]="voyage.price + '€'" />
                            </div>
                        </div>
                        <div>
                            <h3 class="mb-4 font-bold text-xl">{{ voyage.title }}</h3>
                            <p>{{ voyage.description }}</p>
                        </div>
                        <div>
                            <a routerLink="/voyages/{{ voyage.id }}" class="bg-[#181a24] text-[#ffe066] rounded-full px-6 py-3 text-center text:sm md:text-lg font-semibold hover:bg-[#ffd54f] hover:text-[#181a24] transition-colors duration-300">Voir les détails</a>
                        </div>
                    </div>
                    </ng-template>
                </p-carousel>
            </div>
        }
    </div>
</section>
